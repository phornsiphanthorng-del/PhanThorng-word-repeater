<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <!-- បន្ថែមបន្ទាត់ខាងក្រោមនេះ ដើម្បីឱ្យវាឈប់ Zoom Out លើទូរសព្ទ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Repeater Pro</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #1e293b; text-align: center; margin-bottom: 25px; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #64748b; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--primary-color); }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #1d4ed8; }
        #result { 
            margin-top: 25px; 
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            max-height: 300px;
            overflow-y: auto;
            font-size: 16px;
        }
        .line-item { margin-bottom: 5px; color: #334155; }
    </style>
</head>
<body>

    <div class="container">
        <h2>កម្មវិធីព្រីនពាក្យ</h2>
        
        <div class="input-group">
            <label>បញ្ចូលពាក្យ</label>
            <input type="text" id="wordInput" placeholder="សរសេរពាក្យនៅទីនេះ...">
        </div>
        
        <div class="input-group">
            <label>ចំនួនដែលចង់ព្រីន</label>
            <input type="number" id="countInput" value="10">
        </div>
        
        <button onclick="generateWords()">ចាប់ផ្តើមព្រីន</button>

        <div id="result"></div>
    </div>

    <script>
        function generateWords() {
            let word = document.getElementById('wordInput').value;
            let n = parseInt(document.getElementById('countInput').value);
            let display = document.getElementById('result');
            
            display.innerHTML = "";

            if (word.trim() !== "" && n > 0) {
                let output = "";
                for (let i = 1; i <= n; i++) {
                    output += <div class="line-item">${i}. ${word}</div>;
                }
                display.innerHTML = output;
            } else {
                alert("សូមបញ្ចូលព័ត៌មានឱ្យបានគ្រប់គ្រាន់!");
            }
        }
    </script>

</body>
</html>
